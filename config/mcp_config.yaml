# FruitcakeAI v5 — MCP Server Definitions
# Add a new server here to make its tools available to the agent — no code changes needed.

mcp_servers:
  # ── Internal Python servers ──────────────────────────────────────────────────

  calendar:
    type: internal_python
    module: app.mcp.servers.calendar
    enabled: true

  web_research:
    type: internal_python
    module: app.mcp.servers.web_research_v2
    enabled: true

  rss:
    type: internal_python
    module: app.mcp.servers.rss
    enabled: true

  filesystem:
    type: internal_python
    module: app.mcp.servers.filesystem
    enabled: true

  # ── Docker stdio servers ─────────────────────────────────────────────────────
  # These require Docker + the image to be available locally.

  python_refactoring:
    type: docker_stdio
    image: mcp/mcp-python-refactoring
    enabled: true
    timeout: 60
    priority: 10

  duckduckgo:
    type: docker_stdio
    image: mcp/duckduckgo
    enabled: false
    timeout: 60
    priority: 14

  markitdown:
    type: docker_stdio
    image: mcp/markitdown
    enabled: true
    timeout: 60
    priority: 13

  playwright:
    type: docker_stdio
    image: mcp/playwright
    enabled: true
    timeout: 60
    priority: 15    
