services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: fruitcake_v5
      POSTGRES_USER: fruitcake
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fruitcake}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fruitcake -d fruitcake_v5"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Redis is optional — enable in Phase 2 when caching is needed
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redisdata:/data
  #   restart: unless-stopped

volumes:
  pgdata:
  # redisdata:
